<style>
  :root{
    --blue-top:#5BC8F5;
    --blue-bottom:#2FAEEF;
    --dark:#132A3E;
    --dark-2:#1c3a52;
    --white:#ffffff;
    --white-70: rgba(255,255,255,0.72);
    --white-40: rgba(255,255,255,0.4);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background:linear-gradient(180deg, var(--blue-top) 0%, var(--blue-bottom) 100%);
    color:var(--white);
    -webkit-font-smoothing:antialiased;
  }
  #app{
    min-height:100vh;
    max-width:480px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    padding:32px 28px 40px;
    position:relative;
    overflow-x:hidden;
  }
  .screen{
    display:none;
    flex-direction:column;
    flex:1;
    animation:fadeIn .45s ease;
  }
  .screen.active{display:flex;}
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }

  /* ---------- Splash ---------- */
  #screen-splash{
    align-items:center;
    justify-content:center;
    text-align:center;
    cursor:pointer;
  }
  .logo-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:2px;
  }
  .logo-pin{
    position:relative;
    width:64px;
    height:78px;
    flex-shrink:0;
  }
  .logo-pin svg{width:100%;height:100%;display:block;}
  .logo-text{
    font-size:44px;
    font-weight:800;
    letter-spacing:-0.5px;
    color:var(--white);
    line-height:1;
  }
  .logo-t{
    font-size:44px;
    font-weight:800;
    color:var(--white);
    margin-right:-30px;
    position:relative;
    z-index:2;
  }
  .logo-sub{
    margin-top:10px;
    font-size:14px;
    color:var(--white-70);
    letter-spacing:0.2px;
  }
  .brand-logo{
    width:min(78vw, 340px);
    height:auto;
    display:block;
  }

  /* ---------- Headings ---------- */
  h1.title{
    font-size:30px;
    font-weight:800;
    margin:18px 0 26px;
    line-height:1.2;
  }
  .top-logo{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:8px;
  }
  .top-logo .logo-pin{width:26px;height:32px;}
  .top-logo .logo-t{font-size:18px;margin-right:-11px;}
  .top-logo span.brand{font-size:18px;font-weight:800;}

  /* ---------- List items (selection) ---------- */
  .option-list{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:24px;
  }
  .option{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    border-radius:999px;
    border:2px solid transparent;
    background:transparent;
    cursor:pointer;
    transition:border-color .2s ease, background .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .option .label{
    font-size:17px;
    font-weight:600;
    color:var(--white);
  }
  .option .sub-label{
    display:block;
    font-size:12px;
    font-weight:400;
    color:var(--white-70);
    margin-top:2px;
  }
  .option .icon{
    width:26px;height:26px;flex-shrink:0;
    color:var(--white);
    opacity:0.95;
  }
  .option.selected{
    border-color:var(--white-70);
    background:rgba(255,255,255,0.08);
  }
  .option:active{background:rgba(255,255,255,0.12);}

  /* ---------- CTA button ---------- */
  .cta{
    margin-top:auto;
    background:linear-gradient(180deg,var(--dark) 0%, var(--dark-2) 100%);
    color:var(--white);
    border:none;
    border-radius:999px;
    padding:18px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    opacity:0.4;
    pointer-events:none;
    transition:opacity .2s ease, transform .1s ease;
    width:100%;
  }
  .cta.enabled{opacity:1; pointer-events:auto;}
  .cta:active.enabled{transform:scale(0.98);}

  /* ---------- Back arrow ---------- */
  .back-btn{
    background:none;
    border:none;
    color:var(--white);
    font-size:22px;
    cursor:pointer;
    padding:0 0 18px;
    align-self:flex-start;
    display:flex;
    align-items:center;
    gap:6px;
    opacity:0.9;
  }

  /* ---------- Results screen ---------- */
  .result-header{
    text-align:center;
    margin-bottom:6px;
  }
  .result-city{
    font-size:28px;
    font-weight:800;
    letter-spacing:1px;
    margin:6px 0 2px;
  }
  .result-plan{
    font-size:17px;
    font-weight:700;
    color:var(--white-70);
    margin-bottom:26px;
  }
  .stops{
    display:flex;
    flex-direction:column;
    gap:22px;
    overflow-y:auto;
    padding-bottom:20px;
  }
  .stop{
    background:rgba(255,255,255,0.08);
    border-radius:18px;
    padding:18px 20px;
  }
  .stop-title{
    font-size:17px;
    font-weight:700;
    margin:0 0 8px;
  }
  .stop-title .num{
    color:var(--white-70);
    font-weight:800;
    margin-right:6px;
  }
  .stop-desc{
    font-size:14px;
    line-height:1.55;
    color:rgba(255,255,255,0.88);
    margin:0;
  }
  .restart-btn{
    margin-top:22px;
    background:none;
    border:2px solid var(--white-70);
    color:var(--white);
    border-radius:999px;
    padding:14px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    width:100%;
  }

  ::-webkit-scrollbar{width:0px;background:transparent;}
</style>
</head>

/* ============ APP LOGIC ============ */
let selectedCity = null;
let selectedForm = null;

const screens = {
  splash: document.getElementById('screen-splash'),
  city: document.getElementById('screen-city'),
  form: document.getElementById('screen-form'),
  result: document.getElementById('screen-result')
};

function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

/* Build city list */
const cityListEl = document.getElementById('city-list');
CITIES.forEach(city => {
  const div = document.createElement('div');
  div.className = 'option';
  div.innerHTML = `<span class="label">${city}</span>`;
  div.addEventListener('click', () => {
    selectedCity = city;
    document.querySelectorAll('#city-list .option').forEach(o => o.classList.remove('selected'));
    div.classList.add('selected');
    document.getElementById('city-cta').classList.add('enabled');
  });
  cityListEl.appendChild(div);
});

/* Build form list */
const formListEl = document.getElementById('form-list');
FORMS.forEach(f => {
  const div = document.createElement('div');
  div.className = 'option';
  div.innerHTML = `<span class="label">${f.label}</span><span class="icon">${ICONS[f.key]}</span>`;
  div.addEventListener('click', () => {
    selectedForm = f;
    document.querySelectorAll('#form-list .option').forEach(o => o.classList.remove('selected'));
    div.classList.add('selected');
    document.getElementById('form-cta').classList.add('enabled');
  });
  formListEl.appendChild(div);
});

/* Navigation */
document.getElementById('screen-splash').addEventListener('click', () => showScreen('city'));
setTimeout(() => { if(screens.splash.classList.contains('active')) showScreen('city'); }, 2200);

document.getElementById('city-cta').addEventListener('click', () => {
  if(!selectedCity) return;
  showScreen('form');
});

document.getElementById('form-back').addEventListener('click', () => showScreen('city'));

document.getElementById('form-cta').addEventListener('click', () => {
  if(!selectedForm) return;
  renderResult();
  showScreen('result');
});

document.getElementById('result-back').addEventListener('click', () => showScreen('form'));

document.getElementById('restart-btn').addEventListener('click', () => {
  selectedCity = null;
  selectedForm = null;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.getElementById('city-cta').classList.remove('enabled');
  document.getElementById('form-cta').classList.remove('enabled');
  showScreen('city');
});

function renderResult(){
  document.getElementById('result-city').textContent = selectedCity.toUpperCase();
  document.getElementById('result-plan').textContent = `${selectedForm.label} sÉ™yahÉ™t planÄ±`;
  const stopsEl = document.getElementById('result-stops');
  stopsEl.innerHTML = '';
  const plan = (PLANS[selectedCity] && PLANS[selectedCity][selectedForm.key]) || [];
  plan.forEach((stop, i) => {
    const div = document.createElement('div');
    div.className = 'stop';
    div.innerHTML = `<p class="stop-title"><span class="num">${i+1}.</span>${stop.title}</p><p class="stop-desc">${stop.desc}</p>`;
    stopsEl.appendChild(div);
  });
}
